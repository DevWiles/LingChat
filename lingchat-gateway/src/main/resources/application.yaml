server:
  port: 8080

jwt:
  # 与 lingchat-auth-service 保持一致（auth-service 直接将该字符串的字节用作 HMAC key）
  secret: bGluZ2NoYXQtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tdmVyeS1sb25nLXN0cmluZw==

spring:
  application:
    name: lingchat-gateway

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379 # 改为自己的端口
      password: # 输入自己的密码
      database: 0
      timeout: 5000ms

  # Spring Cloud Gateway 路由配置
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # 认证服务路由
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # 用户服务路由（好友、用户信息）
        - id: user-service-friend
          uri: http://localhost:8082
          predicates:
            - Path=/api/friend/**

        - id: user-service-user
          uri: http://localhost:8082
          predicates:
            - Path=/api/user/**

        # 未来其他服务的路由示例
        # - id: chat-service
        #   uri: lb://lingchat-chat-service
        #   predicates:
        #     - Path=/api/chat/**

      # 全局 CORS 配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600

# Actuator 健康检查
management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.lingchat: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"