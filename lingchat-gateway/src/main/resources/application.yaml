server:
  port: 8080

spring:
  application:
    name: lingchat-gateway

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379 # 改为自己的端口
      password: # 改为自己的密码
      database: 0
      timeout: 5000ms

  # Spring Cloud Gateway 路由配置
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # 认证服务路由
        - id: auth-service
          uri: lb://lingchat-auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        # 未来其他服务的路由示例
        # - id: chat-service
        #   uri: lb://lingchat-chat-service
        #   predicates:
        #     - Path=/api/chat/**

        # - id: user-service
        #   uri: lb://lingchat-user-service
        #   predicates:
        #     - Path=/api/user/**

      # 全局 CORS 配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600

# Actuator 健康检查
management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.lingchat: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"